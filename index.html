<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario — U4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <main class="contenedor">

    <header class="form-header">
      <div class="logo-mark">JS</div>
      <div>
        <h1>Registro de Usuario</h1>
        <p class="subtitle">Unidad 4 · JavaScript Básico · Validación de Formularios</p>
      </div>
    </header>

    <form id="form-registro" novalidate>

      <div class="campo-grupo">
        <label for="nombre">Nombre completo</label>
        <div class="input-wrap">
          <input id="nombre" type="text" name="nombre"
                 required minlength="3" maxlength="60"
                 placeholder="Ej: William Balaguera">
          <span class="field-icon" aria-hidden="true">✦</span>
        </div>
        <span class="msg-error" id="error-nombre"></span>
      </div>

      <div class="campo-grupo">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <input id="email" type="email" name="email"
                 required placeholder="usuario@dominio.com">
          <span class="field-icon" aria-hidden="true">✦</span>
        </div>
        <span class="msg-error" id="error-email"></span>
      </div>

      <div class="campo-grupo">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input id="password" type="password" name="password"
                 required minlength="8"
                 placeholder="Mínimo 8 caracteres">
          <span class="field-icon" aria-hidden="true">✦</span>
        </div>
        <span class="msg-error" id="error-password"></span>
        <div class="fortaleza-barra">
          <div class="barra-relleno" id="barra-fortaleza"></div>
        </div>
        <span id="fortaleza-texto" class="fortaleza-texto"></span>
      </div>

      <div class="campo-grupo">
        <label for="confirmar">Confirmar contraseña</label>
        <div class="input-wrap">
          <input id="confirmar" type="password" name="confirmar"
                 required placeholder="Repita la contraseña">
          <span class="field-icon" aria-hidden="true">✦</span>
        </div>
        <span class="msg-error" id="error-confirmar"></span>
      </div>

      <div class="campo-grupo">
        <label for="telefono">Teléfono <span class="opcional">(opcional)</span></label>
        <div class="input-wrap">
          <input id="telefono" type="tel" name="telefono"
                 pattern="[0-9]{7,15}"
                 placeholder="Solo dígitos, 7–15 caracteres">
          <span class="field-icon" aria-hidden="true">✦</span>
        </div>
        <span class="msg-error" id="error-telefono"></span>
      </div>

      <button type="submit" id="btn-registrar">
        <span>Registrarse</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div id="mensaje-exito" class="oculto">
        <span class="exito-icono">✓</span>
        Registro exitoso. ¡Bienvenido al sistema!
      </div>

    </form>
  </main>

  <script src="validacion.js" defer></script>
</body>
</html>
